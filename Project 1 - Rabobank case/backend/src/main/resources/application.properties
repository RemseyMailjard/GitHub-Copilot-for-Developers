# Application properties — H2 in-memory database for lab exercises
spring.application.name=case-summary

# H2 database (in-memory, resets on restart)
spring.datasource.url=jdbc:h2:mem:casesummary
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console for debugging (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Server port
server.port=8080
